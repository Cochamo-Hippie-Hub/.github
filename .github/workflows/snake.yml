# Generates a contribution snake animation SVG
# Runs daily and on push to main
# Output: dist/github-contribution-grid-snake-dark.svg

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:        # Manual trigger
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Cochamo-Hippie-Hub
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=2dd4a8&color_dots=#0d2818,#1a4a2e,#2a6a3e,#3a8a4e,#2dd4a8
            dist/snake-light.svg?palette=github&color_snake=0d7d5f&color_dots=#e8f5e9,#b8d8be,#7ab88a,#4a9960,#0d7d5f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
